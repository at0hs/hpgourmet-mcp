<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホットペッパーAPIコンソール</title>
<link rel="stylesheet" href="/console/app.css">
</head>
<body>
<div class="shell">
  <header>
    <div class="brand"><b>ホットペッパーAPIコンソール</b><span id="brand-slug">-</span></div>
    <div class="envbadge">開発環境専用</div>
  </header>

  <main>
    <nav class="col rail">
      <div class="rail-head">API</div>
      <ul id="apilist"></ul>
    </nav>

    <section class="col">
      <div class="pane-head">パラメータ</div>
      <div class="form" id="form"></div>
    </section>

    <section class="col">
      <div class="wire">
        <div class="wire-label">
          <span>REQUEST URL</span>
          <span class="spacer"></span>
          <button class="linkbtn" id="copyUrl">URLをコピー</button>
          <button class="linkbtn" id="copyCurl">curlをコピー</button>
        </div>
        <div class="wire-url" id="wire"></div>
      </div>
      <div class="status" id="status">
        <span class="statusinfo" id="statusinfo">
          <span class="pill" style="background:#f1efec">READY</span>
          <span>送信するとここに結果が出ます</span>
        </span>
        <div class="tabs" id="tabs" hidden>
          <button data-tab="view" class="on">整形表示</button>
          <button data-tab="raw">生レスポンス</button>
        </div>
      </div>
      <div class="out" id="out">
        <div class="empty"><span class="big">NO RESPONSE</span>左でAPIを選んで送信を押してください。</div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="/console/app.js"></script>
</body>
</html>
